name: CI Gate Topology

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

jobs:
  g1-fmt-lint:
    name: "G1: fmt + lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  g2-unit-property:
    name: "G2: unit + property"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --lib

  g3-differential:
    name: "G3: differential"
    runs-on: ubuntu-latest
    env:
      FNP_REQUIRE_REAL_NUMPY_ORACLE: "1"
      FNP_ORACLE_PYTHON: "python3"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip numpy
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p fnp-conformance --bin capture_numpy_oracle
      - name: Verify oracle uses real NumPy
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          oracle_path = Path("crates/fnp-conformance/fixtures/oracle_outputs/ufunc_oracle_output.json")
          payload = json.loads(oracle_path.read_text(encoding="utf-8"))
          source = payload.get("oracle_source", "")
          if source == "pure_python_fallback":
              raise SystemExit(
                  "G3 failure: oracle capture used pure_python_fallback; configure NumPy-backed FNP_ORACLE_PYTHON"
              )
          print(f"G3 oracle_source={source}")
          PY
      - run: cargo run -p fnp-conformance --bin run_ufunc_differential

  g4-adversarial-security:
    name: "G4: adversarial + security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p fnp-conformance --bin run_security_gate

  g5-test-contract:
    name: "G5: test contract"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p fnp-conformance --bin run_test_contract_gate

  g6-workflow-forensics:
    name: "G6: workflow + forensics"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: >
          cargo run -p fnp-conformance --bin run_workflow_scenario_gate --
          --retries 0 --flake-budget 0 --coverage-floor 1.0

  g7-performance-budget:
    name: "G7: performance budget"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Generate candidate baseline
        run: |
          cargo run -p fnp-conformance --bin generate_benchmark_baseline -- \
            --output-path /tmp/perf_candidate.json
      - name: Run performance budget gate
        run: |
          cargo run -p fnp-conformance --bin run_performance_budget_gate -- \
            --reference-path artifacts/baselines/ufunc_benchmark_baseline.json \
            --candidate-path /tmp/perf_candidate.json \
            --max-p99-regression-ratio 0.07 \
            --coverage-floor 1.0

  g8-durability-decode:
    name: "G8: durability + decode proof"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: >
          cargo run -p fnp-conformance --bin run_raptorq_gate --
          --retries 1 --flake-budget 0 --coverage-floor 1.0
